services:
  fastapi:
    build:
      context: .
    container_name: ev_fastsim_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VEHICLE_ENRICHMENT_PATH: /data/vehicles_enrichment_GLOBAL_20260517_0915.csv
      INDIA_EV_REVIEWS_PATH: /data/india_ev_reviews.xlsx
    expose:
      - "8000"
    volumes:
      - ./data:/data:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: ev_nginx_ingress
    restart: unless-stopped
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
